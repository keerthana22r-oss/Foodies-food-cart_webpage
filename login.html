<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;

    /* 🌄 Background with transparency */
    background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url("./Dinner\ Party\ Food\ Item\,\ Dinner\ Food\ Background\,\ Dinner\ Food\,\ Fastfood\ Background\ Image\ And\ Wallpaper\ for\ Free\ Download.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;
}

/* Center form */
form {
    display: flex;
    justify-content: center;
    padding-top: 100px;
}

/* Login box */
fieldset {
    width: 400px; /* smaller than signup */
    padding: 30px;
    border-radius: 15px;
    border: none;

    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 8px 25px rgba(0,0,0,0.3);
}

/* Title */
legend {
    font-size: 26px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 20px;
}

/* Labels */
label {
    font-weight: bold;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #ff6f61;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e85a4f;
}
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Login</legend>
            <label for="Email">Email</label>
            <input type="email" id="email" name="email">
            <br><br>
            <label for="Password">password</label>
            <input type="password" id="password" name="password">
            <br><br>
            <button>Submit</button>
            <button>Reset</button>

        
        </fieldset>
    </form>
    
</body>
<script src="./login.js"></script>
</html>
